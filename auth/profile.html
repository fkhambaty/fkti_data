<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account | Data For Dummies</title>
    <link rel="stylesheet" href="../styles/design-system.css">
    <link rel="stylesheet" href="../styles/auth.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="auth-page ds-root auth-profile-page">
    <header class="auth-profile-header-bar">
        <a href="../index.html" class="auth-profile-close" title="Back to home" aria-label="Back to home"><i class="fas fa-times"></i></a>
        <span class="auth-profile-title">My Account</span>
        <a href="../index.html" class="auth-profile-home-txt">Home</a>
    </header>
    <div class="auth-card auth-profile-card ds-animate-in">
        <p class="auth-subtitle auth-profile-sub">Manage your profile and subscription.</p>
        <div id="profileError" class="auth-error" style="display:none;margin-bottom:12px;"></div>
        <div id="profileContent" style="display:none;">
            <div class="auth-profile-row">
                <div class="auth-profile-avatar" id="avatarLetter">?</div>
                <div class="auth-profile-info">
                    <h2 id="profileName">—</h2>
                    <p id="profileEmail">—</p>
                    <span class="auth-badge auth-badge-free" id="subscriptionBadge">Free</span>
                </div>
            </div>
            <div class="auth-profile-block">
                <h3 class="auth-profile-block-title">Subscription</h3>
                <p class="auth-profile-block-text" id="subscriptionText">You’re on the Free plan. Unlock all courses and projects with Pro.</p>
                <button type="button" class="ds-btn ds-btn-primary auth-upgrade-btn" id="upgradeBtn">Upgrade to Pro — ₹499/mo</button>
            </div>
            <div class="auth-profile-block" id="progressSection">
                <h3 class="auth-profile-block-title">Continue learning</h3>
                <p class="auth-profile-block-text" id="progressHint">Resume from where you left off.</p>
                <div id="progressList"></div>
            </div>
            <p class="auth-links auth-profile-logout">
                <a href="#" id="logoutBtn">Log out</a>
            </p>
        </div>
        <div id="profileLoading" class="auth-subtitle" style="padding:1rem 0;">Loading…</div>
        <div id="profileLogin" style="display:none;">
            <p class="auth-subtitle">You’re not logged in.</p>
            <a href="login.html" class="ds-btn ds-btn-primary auth-submit">Log in</a>
        </div>
    </div>
    <style>
        .auth-profile-page { padding: 12px 16px 24px; align-items: flex-start; }
        .auth-profile-header-bar { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 420px; margin: 0 auto 8px; padding: 8px 0; }
        .auth-profile-close { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(0,0,0,0.06); color: var(--ds-text); text-decoration: none; font-size: 1.25rem; }
        .auth-profile-close:hover { background: rgba(0,0,0,0.1); }
        .auth-profile-title { font-weight: 700; font-size: 1.1rem; color: var(--ds-text); }
        .auth-profile-home-txt { font-size: 0.9rem; font-weight: 600; color: var(--ds-primary); text-decoration: none; }
        .auth-profile-card { max-width: 420px; padding: var(--ds-space-4); }
        .auth-profile-card h1 { display: none; }
        .auth-profile-sub { margin-bottom: var(--ds-space-3); font-size: 0.875rem; }
        .auth-profile-row { display: flex; align-items: center; gap: 12px; margin-bottom: var(--ds-space-3); }
        .auth-profile-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg,#6366f1,#8b5cf6); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.25rem; flex-shrink: 0; }
        .auth-profile-info { min-width: 0; }
        .auth-profile-info h2 { font-size: 1rem; font-weight: 700; margin: 0 0 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .auth-profile-info p { font-size: 0.8125rem; color: var(--ds-text-muted); margin: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .auth-profile-block { margin-top: var(--ds-space-3); padding-top: var(--ds-space-3); border-top: 1px solid var(--ds-border); }
        .auth-profile-block-title { font-size: 0.875rem; font-weight: 700; margin: 0 0 4px; }
        .auth-profile-block-text { font-size: 0.8125rem; color: var(--ds-text-muted); margin: 0 0 8px; }
        .auth-upgrade-btn { display: block; text-align: center; margin-top: 8px; }
        .auth-profile-logout { margin-top: var(--ds-space-4); font-size: 0.875rem; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/supabase-auth.js"></script>
    <script src="../js/razorpay-checkout.js"></script>
    <script src="../js/progress.js"></script>
    <script>
        var courseUrls = {
            python: '../python_course/index.html',
            airflow: '../airflow_course/index.html',
            llm: '../llm_course/index.html',
            postgres: '../postgres_course/index.html',
            dbt: '../dbt_course/index.html',
            redshift: '../redshift_course/index.html',
            mssql: '../mssql_course/index.html',
            metabase: '../metabase_course/index.html',
            clickhouse: '../clickhouse_course/index.html',
            datascience: '../data_science_course/index.html'
        };
        var courseLabels = {
            python: 'Python for Data Science',
            airflow: 'Apache Airflow',
            llm: 'Large Language Models',
            postgres: 'PostgreSQL',
            dbt: 'DBT',
            redshift: 'AWS Redshift',
            mssql: 'Microsoft SQL Server',
            metabase: 'Metabase',
            clickhouse: 'ClickHouse',
            datascience: 'Data Science'
        };
    </script>
    <script>
        var profileContent = document.getElementById('profileContent');
        var profileLoading = document.getElementById('profileLoading');
        var profileLogin = document.getElementById('profileLogin');
        var avatarLetter = document.getElementById('avatarLetter');
        var profileName = document.getElementById('profileName');
        var profileEmail = document.getElementById('profileEmail');
        var subscriptionBadge = document.getElementById('subscriptionBadge');
        var subscriptionText = document.getElementById('subscriptionText');
        var logoutBtn = document.getElementById('logoutBtn');

        function showLogin() {
            profileLoading.style.display = 'none';
            profileContent.style.display = 'none';
            profileLogin.style.display = 'block';
        }

        var profileErrorEl = document.getElementById('profileError');
        var params = new URLSearchParams(window.location.search);
        if (params.get('error') === 'subscription_unavailable') {
            if (profileErrorEl) {
                profileErrorEl.textContent = params.get('msg') || 'Could not start subscription. Please try again from the Pricing page or contact support.';
                profileErrorEl.style.display = 'block';
            }
            if (window.history && window.history.replaceState) window.history.replaceState({}, '', window.location.pathname);
        }
        if (params.get('subscription') === 'success' && profileErrorEl) {
            profileErrorEl.style.display = 'none';
            if (window.history && window.history.replaceState) window.history.replaceState({}, '', window.location.pathname);
        }

        function showProfile(session) {
            profileLoading.style.display = 'none';
            profileLogin.style.display = 'none';
            profileContent.style.display = 'block';
            var upgradeBtn = document.getElementById('upgradeBtn');
            if (upgradeBtn) {
                upgradeBtn.addEventListener('click', function () {
                    if (window.FKTI_RazorpayCheckout && window.FKTI_RazorpayCheckout.openProCheckout) {
                        window.FKTI_RazorpayCheckout.openProCheckout();
                    } else {
                        window.location.href = '../pricing.html';
                    }
                });
            }
            var user = session.user;
            var email = user.email || '';
            var name = (user.user_metadata && user.user_metadata.full_name) || email.split('@')[0] || 'User';
            avatarLetter.textContent = name.charAt(0).toUpperCase();
            profileName.textContent = name;
            profileEmail.textContent = email;

            if (window.FKTI_Auth && window.FKTI_Auth.getProfile) {
                window.FKTI_Auth.getProfile(user.id).then(function (profRes) {
                    var profile = profRes.data;
                    if (profile && profile.subscription_status === 'pro') {
                        subscriptionBadge.className = 'auth-badge auth-badge-pro';
                        subscriptionBadge.textContent = 'Pro';
                        subscriptionText.textContent = 'You have full access to all courses and projects. Thank you for supporting Data For Dummies!';
                        var next = subscriptionText.nextElementSibling;
                        if (next) next.style.display = 'none';
                    }
                }).catch(function () {});
            }

            if (window.FKTI_Progress && window.FKTI_Progress.getProgress) {
                window.FKTI_Progress.getProgress().then(function (list) {
                    var el = document.getElementById('progressList');
                    var hint = document.getElementById('progressHint');
                    if (!el) return;
                    if (!list.length) {
                        hint.textContent = 'No progress yet. Start a course from the Learning Path — your progress will be saved here.';
                        return;
                    }
                    hint.textContent = 'Resume from where you left off.';
                    el.innerHTML = list.slice(0, 5).map(function (p) {
                        var label = courseLabels[p.course_id] || p.course_id;
                        var url = courseUrls[p.course_id] || '../learning-path.html';
                        var last = p.last_lesson_label || p.last_lesson_id || 'Continue';
                        return '<a href="' + url + '" style="display:block;padding:10px 12px;background:var(--ds-surface-elevated);border-radius:8px;margin-top:8px;text-decoration:none;color:var(--ds-text);font-weight:600;"><span style="display:block;font-size:0.85rem;">' + label + '</span><span style="font-size:0.8rem;color:var(--ds-text-muted);">' + (p.progress_pct ? p.progress_pct + '% complete' : '') + ' · ' + last + '</span></a>';
                    }).join('');
                }).catch(function () {});
            }

            logoutBtn.addEventListener('click', function (e) {
                e.preventDefault();
                if (window.FKTI_Auth && window.FKTI_Auth.signOut) {
                    window.FKTI_Auth.signOut().then(function () {
                        window.location.href = 'login.html';
                    });
                } else {
                    window.location.href = 'login.html';
                }
            });
        }

        if (!window.FKTI_Auth || !window.FKTI_Auth.getSession) {
            showLogin();
        } else {
            var settled = false;
            window.FKTI_Auth.getSession()
                .then(function (res) {
                    if (settled) return;
                    settled = true;
                    var session = res.data && res.data.session;
                    if (session) showProfile(session);
                    else showLogin();
                })
                .catch(function () {
                    if (!settled) { settled = true; showLogin(); }
                });
            setTimeout(function () {
                if (!settled) {
                    settled = true;
                    if (profileLoading.style.display !== 'none') showLogin();
                }
            }, 2500);
        }
    </script>
</body>
</html>
