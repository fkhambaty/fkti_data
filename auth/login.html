<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Data For Dummies</title>
    <link rel="stylesheet" href="../styles/design-system.css">
    <link rel="stylesheet" href="../styles/auth.css">
</head>
<body class="auth-page ds-root">
    <a href="../index.html" class="auth-back-home"><span aria-hidden="true">←</span> Back to home</a>
    <div class="auth-card ds-animate-in">
        <h1>Log in</h1>
        <p class="auth-subtitle">Welcome back. Sign in to continue learning.</p>
        <div id="authError" class="auth-error" style="display:none;"></div>
        <div id="authSuccess" class="auth-success" style="display:none;"></div>
        <form class="auth-form" id="loginForm">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="you@example.com" autocomplete="email">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="current-password">
            <button type="submit" class="ds-btn ds-btn-primary auth-submit" id="submitBtn">Log in</button>
        </form>
        <div class="auth-divider">or</div>
        <p class="auth-links">
            <a href="signup.html">Create an account</a> · <a href="reset-password.html">Forgot password?</a>
        </p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/supabase-auth.js"></script>
    <script>
        var form = document.getElementById('loginForm');
        var errEl = document.getElementById('authError');
        var successEl = document.getElementById('authSuccess');
        var submitBtn = document.getElementById('submitBtn');
        var params = new URLSearchParams(window.location.search);
        if (params.get('reset') === 'success') {
            successEl.textContent = 'Password updated. You can log in with your new password.';
            successEl.style.display = 'block';
        }
        var returnTo = params.get('returnTo') || 'profile.html';
        if (returnTo.indexOf('/') === -1) returnTo = returnTo.replace(/^auth\//, '');

        form.addEventListener('submit', function (e) {
            e.preventDefault();
            errEl.style.display = 'none';
            successEl.style.display = 'none';
            errEl.textContent = '';
            submitBtn.disabled = true;
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;

            if (!email || !password) {
                errEl.textContent = 'Please enter email and password.';
                errEl.style.display = 'block';
                submitBtn.disabled = false;
                return;
            }

            if (!window.FKTI_Auth || !window.FKTI_Auth.signInWithPassword) {
                errEl.textContent = 'Auth not loaded. Refresh the page and try again.';
                errEl.style.display = 'block';
                submitBtn.disabled = false;
                return;
            }

            window.FKTI_Auth.signInWithPassword(email, password).then(function (res) {
                if (res.error) {
                    var msg = res.error.message || 'Login failed.';
                    if (msg.indexOf('Invalid login') !== -1 || msg.indexOf('invalid_credentials') !== -1) {
                        msg = 'Invalid email or password. Try again or reset your password.';
                    } else if (msg.indexOf('Email not confirmed') !== -1) {
                        msg = 'Please confirm your email first. Check your inbox for the verification link.';
                    }
                    errEl.textContent = msg;
                    errEl.style.display = 'block';
                    submitBtn.disabled = false;
                    return;
                }
                window.location.href = returnTo;
            }).catch(function (err) {
                errEl.textContent = (err && err.message) || 'Something went wrong. Try again.';
                errEl.style.display = 'block';
                submitBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
