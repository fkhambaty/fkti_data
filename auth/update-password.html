<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set new password | Data For Dummies</title>
    <link rel="stylesheet" href="../styles/design-system.css">
    <link rel="stylesheet" href="../styles/auth.css">
</head>
<body class="auth-page ds-root">
    <a href="../index.html" class="auth-back-home"><span aria-hidden="true">←</span> Back to home</a>
    <div class="auth-card ds-animate-in">
        <h1>Set new password</h1>
        <p class="auth-subtitle">Enter your new password below. You’ll use it to log in from now on.</p>
        <div id="authError" class="auth-error" style="display:none;"></div>
        <div id="authSuccess" class="auth-success" style="display:none;"></div>
        <div id="noToken" style="display:none;">
            <p class="auth-subtitle">This page is for setting a new password after you clicked the link in your email. If you didn’t get the email, <a href="reset-password.html">request a new reset link</a>.</p>
            <p class="auth-links"><a href="login.html">Back to login</a></p>
        </div>
        <form class="auth-form" id="updateForm" style="display:none;">
            <label for="password">New password</label>
            <input type="password" id="password" name="password" required placeholder="At least 6 characters" autocomplete="new-password" minlength="6">
            <label for="confirm">Confirm password</label>
            <input type="password" id="confirm" name="confirm" required placeholder="Same password again" autocomplete="new-password" minlength="6">
            <button type="submit" class="ds-btn ds-btn-primary auth-submit" id="submitBtn">Update password</button>
        </form>
        <p class="auth-links" id="linksRow">
            <a href="login.html">Back to login</a>
        </p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/supabase-auth.js"></script>
    <script>
        (function () {
            var updateForm = document.getElementById('updateForm');
            var noToken = document.getElementById('noToken');
            var errEl = document.getElementById('authError');
            var successEl = document.getElementById('authSuccess');
            var submitBtn = document.getElementById('submitBtn');
            var linksRow = document.getElementById('linksRow');

            function showForm() {
                noToken.style.display = 'none';
                updateForm.style.display = 'block';
            }

            function showNoToken() {
                updateForm.style.display = 'none';
                noToken.style.display = 'block';
            }

            if (!window.FKTI_Auth || !window.FKTI_Auth.getSession) {
                showNoToken();
                return;
            }

            function tryShowForm() {
                window.FKTI_Auth.getSession().then(function (res) {
                    var session = res.data && res.data.session;
                    if (session && session.user) {
                        showForm();
                        return;
                    }
                    if (window.location.hash && window.location.hash.indexOf('access_token') !== -1) {
                        showForm();
                        return;
                    }
                    showNoToken();
                }).catch(function () { showNoToken(); });
            }
            tryShowForm();
            if (window.location.hash && window.location.hash.indexOf('access_token') !== -1) {
                setTimeout(tryShowForm, 600);
            }

            updateForm.addEventListener('submit', function (e) {
                e.preventDefault();
                errEl.style.display = 'none';
                successEl.style.display = 'none';
                var password = document.getElementById('password').value;
                var confirm = document.getElementById('confirm').value;
                if (password !== confirm) {
                    errEl.textContent = 'Passwords do not match.';
                    errEl.style.display = 'block';
                    return;
                }
                if (password.length < 6) {
                    errEl.textContent = 'Password must be at least 6 characters.';
                    errEl.style.display = 'block';
                    return;
                }
                submitBtn.disabled = true;
                window.FKTI_Auth.updateUserPassword(password).then(function (res) {
                    if (res.error) {
                        errEl.textContent = res.error.message || 'Could not update password.';
                        errEl.style.display = 'block';
                        submitBtn.disabled = false;
                        return;
                    }
                    successEl.textContent = 'Password updated. Redirecting to login…';
                    successEl.style.display = 'block';
                    updateForm.reset();
                    setTimeout(function () {
                        window.location.replace('login.html?reset=success');
                    }, 1500);
                }).catch(function (err) {
                    errEl.textContent = (err && err.message) || 'Something went wrong.';
                    errEl.style.display = 'block';
                    submitBtn.disabled = false;
                });
            });
        })();
    </script>
</body>
</html>
