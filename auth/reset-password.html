<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset password | Data For Dummies</title>
    <link rel="stylesheet" href="../styles/design-system.css">
    <link rel="stylesheet" href="../styles/auth.css">
</head>
<body class="auth-page ds-root">
    <a href="../index.html" class="auth-back-home"><span aria-hidden="true">←</span> Back to home</a>
    <div class="auth-card ds-animate-in">
        <h1>Reset password</h1>
        <p class="auth-subtitle">Enter your email and we’ll send you a link to reset your password.</p>
        <div id="authError" class="auth-error" style="display:none;"></div>
        <div id="authSuccess" class="auth-success" style="display:none;"></div>
        <form class="auth-form" id="resetForm">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="you@example.com" autocomplete="email">
            <button type="submit" class="ds-btn ds-btn-primary auth-submit" id="submitBtn">Send reset link</button>
        </form>
        <p class="auth-links">
            <a href="login.html">Back to login</a>
        </p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/supabase-auth.js"></script>
    <script>
        var form = document.getElementById('resetForm');
        var errEl = document.getElementById('authError');
        var successEl = document.getElementById('authSuccess');
        var submitBtn = document.getElementById('submitBtn');
        var supabase = window.FKTI_Auth && window.FKTI_Auth.getSupabase ? window.FKTI_Auth.getSupabase() : null;

        form.addEventListener('submit', function (e) {
            e.preventDefault();
            errEl.style.display = 'none';
            successEl.style.display = 'none';
            errEl.textContent = '';
            successEl.textContent = '';
            submitBtn.disabled = true;
            var email = document.getElementById('email').value.trim();

            if (!supabase) {
                errEl.textContent = 'Supabase not configured.';
                errEl.style.display = 'block';
                submitBtn.disabled = false;
                return;
            }

            supabase.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/auth/login.html?reset=1'
            }).then(function (res) {
                if (res.error) {
                    errEl.textContent = res.error.message || 'Could not send reset email.';
                    errEl.style.display = 'block';
                    submitBtn.disabled = false;
                    return;
                }
                successEl.textContent = 'Check your email for the reset link.';
                successEl.style.display = 'block';
                form.reset();
                submitBtn.disabled = false;
            }).catch(function () {
                errEl.textContent = 'Something went wrong. Try again.';
                errEl.style.display = 'block';
                submitBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
